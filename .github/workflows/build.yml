name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devbox:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container creates successfully
        run: |
          docker create --name devbox-test \
            -v /tmp/workspace:/workspace \
            devbox:test

      - name: CLI tools exist
        run: |
          docker run --rm devbox:test bash -c '
            for cmd in bat curl delta eza fd fzf gh glow jq rg starship xh yq zoxide; do
              which "$cmd" || { echo "MISSING: $cmd"; exit 1; }
            done
          '

      - name: TUI tools exist
        run: |
          docker run --rm devbox:test bash -c '
            for cmd in edit fresh gh-dash lazygit yazi; do
              which "$cmd" || { echo "MISSING: $cmd"; exit 1; }
            done
          '

      - name: Shell config loads without errors
        run: docker run --rm devbox:test bash -lc 'echo ok'

      - name: Install script works (non-TTY)
        run: |
          mkdir -p /tmp/workspace
          bash install.sh 2>&1 | tail -1 | grep -q 'Install complete'

      - name: Cleanup
        if: always()
        run: docker rm -f devbox-test 2>/dev/null || true
